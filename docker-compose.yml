version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: resumeai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resumeai

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumeai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/resumeai
      JWT_SECRET: ${JWT_SECRET:-devsecret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-devrefreshsecret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumeai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
